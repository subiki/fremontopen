openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CueStats — Fremont Open API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stats
    description: Dashboard stats
  - name: tournaments
    description: Tournament operations
  - name: players
    description: Player operations
  - name: matches
    description: Match operations
  - name: search
    description: Search operations
  - name: sync
    description: Sync status
  - name: admin
    description: Admin operations
  - name: anthropic
    description: Anthropic AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /sync/status:
    get:
      operationId: getSyncStatus
      tags: [sync]
      summary: Get sync status
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List all tournaments
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tournament"

  /tournaments/{id}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get tournament with matches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament with matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List players with optional search
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"

  /players/{name}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player profile with matches and head-to-head
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /players/{name}/extras:
    get:
      operationId: getPlayerExtras
      tags: [players]
      summary: Get player extras — streaks, titles, wins over time
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player extras
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerExtras"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [players]
      summary: Get top players leaderboard
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List recent matches
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search players and tournaments
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"

  /compare/{a}/{b}:
    get:
      operationId: comparePlayers
      tags: [players]
      summary: Compare two players head-to-head
      parameters:
        - name: a
          in: path
          required: true
          schema:
            type: string
        - name: b
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminToken"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"

  /admin/sync:
    post:
      operationId: triggerSync
      tags: [admin]
      summary: Trigger data sync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncTriggerInput"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /admin/players/{name}/rename:
    post:
      operationId: renamePlayer
      tags: [admin]
      summary: Rename a player
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenamePlayerInput"
      responses:
        "200":
          description: Rename result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActionResult"

  /admin/players/merge:
    post:
      operationId: mergePlayers
      tags: [admin]
      summary: Merge duplicate players
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MergePlayersInput"
      responses:
        "200":
          description: Merge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActionResult"

  /admin/players/{name}/fargo:
    put:
      operationId: adminSetFargo
      tags: [admin]
      summary: Set a player's Fargo rating
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FargoInput"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminActionResult"

  /admin/matches/{id}:
    patch:
      operationId: updateMatch
      tags: [admin]
      summary: Update a match result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchUpdateInput"
      responses:
        "200":
          description: Updated match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
    delete:
      operationId: deleteMatch
      tags: [admin]
      summary: Delete a match
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/audit-log:
    get:
      operationId: getAuditLog
      tags: [admin]
      summary: Get audit log entries
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnthropicMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Stats:
      type: object
      properties:
        total_tournaments:
          type: integer
        total_matches:
          type: integer
        total_players:
          type: integer
        last_synced_at:
          type: ["string", "null"]
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        recent_matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
      required:
        - total_tournaments
        - total_matches
        - total_players
        - players
        - recent_matches

    SyncStatus:
      type: object
      properties:
        status:
          type: string
        last_synced_at:
          type: ["string", "null"]
        tournaments_synced:
          type: ["integer", "null"]
        matches_synced:
          type: ["integer", "null"]
        players_rebuilt:
          type: ["integer", "null"]
      required:
        - status

    Tournament:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        game:
          type: ["string", "null"]
        state:
          type: string
        started_at:
          type: ["string", "null"]
      required:
        - id
        - name
        - state

    TournamentDetail:
      type: object
      properties:
        tournament:
          $ref: "#/components/schemas/Tournament"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
      required:
        - tournament
        - matches

    Player:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        wins:
          type: integer
        losses:
          type: integer
        win_rate:
          type: number
        fargo:
          type: ["integer", "null"]
      required:
        - id
        - name
        - wins
        - losses
        - win_rate

    PlayerDetail:
      type: object
      properties:
        player:
          $ref: "#/components/schemas/Player"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
        head_to_head:
          type: array
          items:
            $ref: "#/components/schemas/H2HRecord"
      required:
        - player
        - matches
        - head_to_head

    H2HRecord:
      type: object
      properties:
        opponent:
          type: string
        wins:
          type: integer
        losses:
          type: integer
      required:
        - opponent
        - wins
        - losses

    PlayerExtras:
      type: object
      properties:
        streaks:
          type: object
          additionalProperties: true
        titles:
          type: object
          additionalProperties: true
        perf_vs_fargo:
          type: object
          additionalProperties: true
        wins_over_time:
          type: array
          items:
            type: object
            additionalProperties: true
        fargo:
          type: ["integer", "null"]
      required:
        - streaks
        - titles
        - wins_over_time

    Match:
      type: object
      properties:
        id:
          type: string
        tournament_id:
          type: integer
        tournament_name:
          type: ["string", "null"]
        round:
          type: ["integer", "null"]
        state:
          type: ["string", "null"]
        scores:
          type: ["string", "null"]
        winner_name:
          type: ["string", "null"]
        loser_name:
          type: ["string", "null"]
        completed_at:
          type: ["string", "null"]
      required:
        - id
        - tournament_id

    SearchResult:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        tournaments:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
      required:
        - players
        - tournaments

    CompareResult:
      type: object
      properties:
        a:
          $ref: "#/components/schemas/Player"
        b:
          $ref: "#/components/schemas/Player"
        h2h:
          type: object
          properties:
            a_wins:
              type: integer
            b_wins:
              type: integer
            matches:
              type: array
              items:
                $ref: "#/components/schemas/Match"
          required:
            - a_wins
            - b_wins
            - matches
        common_opponents:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - a
        - b
        - h2h
        - common_opponents

    AdminLoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AdminToken:
      type: object
      properties:
        token:
          type: string
        email:
          type: string
        role:
          type: string
      required:
        - token
        - email
        - role

    AdminMe:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
      required:
        - email
        - role

    SyncTriggerInput:
      type: object
      properties:
        force:
          type: boolean
        tournament_id:
          type: ["integer", "null"]
      required: []

    RenamePlayerInput:
      type: object
      properties:
        new_name:
          type: string
      required:
        - new_name

    MergePlayersInput:
      type: object
      properties:
        canonical_name:
          type: string
        alias_names:
          type: array
          items:
            type: string
      required:
        - canonical_name
        - alias_names

    FargoInput:
      type: object
      properties:
        fargo:
          type: ["integer", "null"]
      required: []

    MatchUpdateInput:
      type: object
      properties:
        winner_name:
          type: ["string", "null"]
        loser_name:
          type: ["string", "null"]
        scores:
          type: ["string", "null"]
      required: []

    AdminActionResult:
      type: object
      properties:
        message:
          type: string
        matches_updated:
          type: ["integer", "null"]
      required:
        - message

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
      required:
        - id
        - action
        - created_at

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    AnthropicConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    AnthropicMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
