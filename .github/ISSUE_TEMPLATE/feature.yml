name: Feature request
description: Suggest a new feature or improvement
labels: ["P2"]
body:
  - type: dropdown
    id: epic
    attributes:
      label: Epic
      options:
        - tournaments
        - players
        - community
        - charts
        - mobile-ux
        - seasons
        - integrations
        - platform
        - business
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the feature
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done?
      value: |
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: effort
    attributes:
      label: Estimated effort
      options:
        - "S (≤ 1 day)"
        - "M (1–3 days)"
        - "L (> 3 days)"
    validations:
      required: false
