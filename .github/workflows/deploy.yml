name: Deploy static demo to DreamHost shared hosting

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build static frontend
        working-directory: frontend
        env:
          CI: "false"
          REACT_APP_STATIC_DATA: "true"
        run: yarn build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync static site to DreamHost web root
        env:
          DEPLOY_WEBROOT: ${{ secrets.DEPLOY_WEBROOT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          TARGET="${DEPLOY_WEBROOT:-${DEPLOY_PATH}/passenger_root/public}"
          if [ -z "$TARGET" ]; then
            echo "Set DEPLOY_WEBROOT or DEPLOY_PATH in repository secrets." >&2
            exit 1
          fi
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            frontend/build/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${TARGET}/"

      - name: Smoke test static site
        env:
          DEPLOY_SITE_HOST: ${{ secrets.DEPLOY_SITE_HOST }}
        run: |
          if [ -z "$DEPLOY_SITE_HOST" ]; then
            echo "DEPLOY_SITE_HOST is not set; skipping smoke test."
            exit 0
          fi
          curl -fsS --retry 5 --retry-delay 5 \
            "https://${DEPLOY_SITE_HOST}/" \
            | grep -qi "<!doctype html"
