name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend build ───────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
        run: |
          echo "REACT_APP_BACKEND_URL=$REACT_APP_BACKEND_URL" > .env.production
          yarn build

      # ── SSH setup ────────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      # ── Upload frontend build to DreamHost domain web root ───────────────────
      # DEPLOY_WEBROOT is the domain's document root, e.g. /home/user/fremontopen.com
      # DreamHost's web server serves static files directly from this directory.
      # The panel Proxy Server forwards /api/* to the FastAPI backend on port 8001.
      - name: Rsync frontend → web root
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            frontend/build/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_WEBROOT }}/"

      # ── Upload backend source ────────────────────────────────────────────────
      - name: Rsync backend → server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'venv' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache' \
            backend/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/backend/"

      # ── Remote: pip install + systemctl --user restart (no sudo) ────────────
      - name: Remote deploy script
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_PATH=${{ secrets.DEPLOY_PATH }} bash -s" < deploy/remote_deploy.sh

      # ── Smoke test ───────────────────────────────────────────────────────────
      - name: Smoke test API
        run: |
          curl -fsS --retry 5 --retry-delay 5 \
            "${{ secrets.REACT_APP_BACKEND_URL }}/api/health" \
            | tee /dev/stderr
