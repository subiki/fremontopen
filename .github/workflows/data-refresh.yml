name: Scheduled static data refresh

on:
  schedule:
    - cron: "30 18 * * 2"
    - cron: "30 19 1 * *"
  workflow_dispatch: {}

concurrency:
  group: static-data-refresh
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check public repo boundary
        run: python scripts/check_public_boundary.py --tracked-only

      - name: Preflight secrets
        env:
          CHALLONGE_API_KEY: ${{ secrets.CHALLONGE_API_KEY }}
          CHALLONGE_SUBDOMAIN: fremontopen
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_WEBROOT: ${{ secrets.DEPLOY_WEBROOT }}
          DEPLOY_SITE_HOST: ${{ secrets.DEPLOY_SITE_HOST }}
        run: |
          missing=0
          require_secret() {
            if [ -z "${!1}" ]; then
              echo "::error title=Missing GitHub secret::$1 is required for scheduled static data refresh"
              missing=1
            fi
          }

          require_secret CHALLONGE_API_KEY
          require_secret SSH_PRIVATE_KEY
          require_secret DEPLOY_HOST
          require_secret DEPLOY_USER
          require_secret DEPLOY_WEBROOT
          require_secret DEPLOY_SITE_HOST

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          {
            echo "## Scheduled Static Data Refresh"
            echo "- Preflight secrets: passed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: python -m pip install -r backend/requirements.txt

      - name: Sync and export static cache
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./cuestats_dev.db
          CHALLONGE_API_KEY: ${{ secrets.CHALLONGE_API_KEY }}
          CHALLONGE_SUBDOMAIN: fremontopen
        run: |
          python sync_job.py
          python sync_job.py --dedupe-only
          python validation_report.py
          if [ -f manual_side_matches.csv ]; then
            python import_side_matches.py --source manual_side_matches.csv
          fi
          python export_static.py
          python ../scripts/check_static_data_budget.py

      - name: Monthly Fargo refresh
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 19 1 * *'
        working-directory: backend
        env:
          FARGO_SOURCE_URL: ${{ secrets.FARGO_SOURCE_URL }}
          FARGO_SOURCE_LABEL: ${{ secrets.FARGO_SOURCE_LABEL }}
          FARGO_FETCH_DELAY_SECONDS: ${{ secrets.FARGO_FETCH_DELAY_SECONDS }}
        run: |
          if [ -z "$FARGO_SOURCE_URL" ]; then
            echo "::warning title=Fargo source not configured::Set FARGO_SOURCE_URL to enable monthly Fargo refresh"
            echo "- Fargo refresh: skipped, FARGO_SOURCE_URL is not configured" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          label="${FARGO_SOURCE_LABEL:-monthly-authorized-source}"
          delay="${FARGO_FETCH_DELAY_SECONDS:-5}"
          python fargo_refresh.py \
            --source-url "$FARGO_SOURCE_URL" \
            --source-label "$label" \
            --delay "$delay"
          python export_static.py
          echo "- Fargo refresh: completed from authorized source" >> "$GITHUB_STEP_SUMMARY"

      - name: Append refresh summary
        run: cat frontend/public/data/refresh-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build static frontend
        working-directory: frontend
        env:
          REACT_APP_STATIC_DATA: "true"
        run: yarn build

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- \
            backend/cuestats_dev.db \
            backend/player_overrides.json \
            frontend/public/data/cache.json \
            frontend/public/data/data-size-report.json \
            frontend/public/data/refresh-change-report.json \
            frontend/public/data/refresh-summary.md \
            frontend/public/data/version.json \
            frontend/public/data/h2h-heatmap.json \
            frontend/public/data/players-index.json \
            frontend/public/data/players-search-index.json \
            frontend/public/data/recent-matches.json \
            frontend/public/data/rivalry-index.json \
            frontend/public/data/single-tournament-overperformers.json \
            frontend/public/data/tournament-duration-groups.json \
            frontend/public/data/players \
            frontend/public/data/season-standings.json \
            frontend/public/data/tournaments-index.json \
            frontend/public/data/tournaments-search-index.json \
            frontend/public/data/tournaments; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "- Data changes: none" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "- Data changes: detected" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit refreshed data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            backend/cuestats_dev.db \
            backend/player_overrides.json \
            frontend/public/data/cache.json \
            frontend/public/data/data-size-report.json \
            frontend/public/data/refresh-change-report.json \
            frontend/public/data/refresh-summary.md \
            frontend/public/data/version.json \
            frontend/public/data/h2h-heatmap.json \
            frontend/public/data/players-index.json \
            frontend/public/data/players-search-index.json \
            frontend/public/data/recent-matches.json \
            frontend/public/data/rivalry-index.json \
            frontend/public/data/single-tournament-overperformers.json \
            frontend/public/data/tournament-duration-groups.json \
            frontend/public/data/players \
            frontend/public/data/season-standings.json \
            frontend/public/data/tournaments-index.json \
            frontend/public/data/tournaments-search-index.json \
            frontend/public/data/tournaments
          cat > /tmp/refresh-commit-message.txt <<'EOF'
          [JFL][Agent-GitHub-Actions] Refresh static tournament data

          Completed:
          - Synced Challonge into the local SQLite cache.
          - Rebuilt the exported static cache.
          - Verified the static frontend build before deploy.

          Remaining:
          - Review validation_report artifacts locally if data quality changes look suspicious.

          Blockers:
          - None.

          Next:
          - Continue normal static deploy verification.

          Agent: GitHub Actions
          Intent: Scheduled static data and optional monthly Fargo refresh without a manual code push.
          Context: #67 #68
          EOF
          git commit -F /tmp/refresh-commit-message.txt
          git push

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Verify SSH and webroot
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_WEBROOT: ${{ secrets.DEPLOY_WEBROOT }}
        run: |
          SSH_OPTS="-i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15"
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "echo ssh-ok" >/dev/null
          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" \
            "test -d '$DEPLOY_WEBROOT' || { echo 'Deploy webroot does not exist'; exit 2; }; test -w '$DEPLOY_WEBROOT' || { echo 'Deploy webroot is not writable'; exit 3; }"

          {
            echo "- SSH login: passed"
            echo "- DreamHost webroot: exists and writable"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rsync static site to DreamHost web root
        env:
          DEPLOY_WEBROOT: ${{ secrets.DEPLOY_WEBROOT }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            frontend/build/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_WEBROOT/"

          echo "- Rsync upload: passed" >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test static site
        env:
          DEPLOY_SITE_HOST: ${{ secrets.DEPLOY_SITE_HOST }}
        run: |
          curl -fsSL \
            --retry 5 \
            --retry-delay 5 \
            --retry-connrefused \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            "https://${DEPLOY_SITE_HOST}/?refresh_check=${GITHUB_SHA}" \
            -o /tmp/fremontopen-refresh-smoke.html

          grep -qi "<!doctype html" /tmp/fremontopen-refresh-smoke.html
          echo "- Smoke test: passed" >> "$GITHUB_STEP_SUMMARY"
