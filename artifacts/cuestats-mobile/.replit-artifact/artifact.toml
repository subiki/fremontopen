kind = "mobile"
previewPath = "/mobile/"
title = "CueStats Mobile"
version = "1.0.0"
id = "artifacts/cuestats-mobile"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 20118
ensurePreviewReachable = "/"

[services.development]
run = "node /home/runner/workspace/artifacts/cuestats-mobile/scripts/dev.js"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cuestats-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cuestats-mobile", "run", "serve" ]

[services.env]
PORT = "20118"
BASE_PATH = "/mobile/"
