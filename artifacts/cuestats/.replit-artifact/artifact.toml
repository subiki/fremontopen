kind = "web"
previewPath = "/"
title = "CueStats — Fremont Open"
version = "1.0.0"
id = "artifacts/cuestats"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 23218

[services.development]
run = "bash /home/runner/workspace/dev_frontend.sh"

[services.production]
build = ["pnpm", "--filter", "@workspace/cuestats", "run", "build"]
publicDir = "artifacts/cuestats/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23218"
BASE_PATH = "/"
