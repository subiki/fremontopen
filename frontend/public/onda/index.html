<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>Onda</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #111827;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8fa;
      }

      main {
        box-sizing: border-box;
        min-height: 100vh;
        padding: 2.5rem 1.25rem;
      }

      section {
        display: flex;
        min-height: calc(100vh - 5rem);
        max-width: 36rem;
        margin: 0 auto;
        flex-direction: column;
        justify-content: center;
      }

      .card {
        border: 1px solid #d7dee8;
        border-radius: 0.5rem;
        background: #ffffff;
        padding: 2rem;
        box-shadow: 0 1px 2px rgba(17, 24, 39, 0.08);
      }

      .kicker {
        margin: 0;
        color: #047857;
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.75rem 0 0;
        font-size: clamp(1.875rem, 8vw, 2.25rem);
        line-height: 1.1;
      }

      p {
        margin: 0.75rem 0 0;
        color: #4b5563;
        font-size: 1rem;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 2.75rem;
        width: 100%;
        box-sizing: border-box;
        align-items: center;
        justify-content: center;
        margin-top: 1.75rem;
        border-radius: 0.375rem;
        background: #047857;
        color: #ffffff;
        padding: 0.75rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        background: #065f46;
      }

      a:focus {
        outline: 2px solid #047857;
        outline-offset: 3px;
      }

      @media (min-width: 640px) {
        a {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="card">
          <p class="kicker">Onda</p>
          <h1>Quick sign-up form</h1>
          <p>Use the link below to open the form.</p>
          <a href="https://forms.gle/tbyQyPmQgVE5y9Vr5" target="_blank" rel="noopener noreferrer">
            Open Google Form
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
